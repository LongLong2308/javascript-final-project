<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Interactive Vietnam Photo Gallery</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js" defer></script>
</head>

<body>

    <!-- Liên kết hỗ trợ người dùng bàn phím -->
    <a class="skip-link" href="#main-content">
        Skip to Main Content
    </a>

    <header>
        <h1>Interactive Vietnam Photo Gallery</h1>

        <p>
            Move your mouse over an image or use the Tab key
            to explore the gallery.
        </p>
    </header>

    <main id="main-content">

        <!-- Khu vực hiển thị ảnh đang được chọn -->
        <div id="image-preview"
             class="image-preview"
             aria-live="polite">

            Choose an image below to display it here.

        </div>

        <!-- Thư viện gồm 6 hình ảnh -->
        <section class="gallery"
                 aria-label="Vietnam photo gallery">

            <figure>
                <img
                    src="images/vietnam1.jpg"
                    alt="Ha Long Bay with limestone islands">

                <figcaption>
                    Ha Long Bay
                </figcaption>
            </figure>

            <figure>
                <img
                    src="images/vietnam2.jpg"
                    alt="Golden Bridge held by giant stone hands in Da Nang">

                <figcaption>
                    Golden Bridge
                </figcaption>
            </figure>

            <figure>
                <img
                    src="images/vietnam3.jpg"
                    alt="Traditional yellow buildings in Hoi An Ancient Town">

                <figcaption>
                    Hoi An Ancient Town
                </figcaption>
            </figure>

            <figure>
                <img
                    src="images/vietnam4.jpg"
                    alt="Green rice terraces surrounded by mountains in Sa Pa">

                <figcaption>
                    Sa Pa Rice Terraces
                </figcaption>
            </figure>

            <figure>
                <img
                    src="images/vietnam5.jpg"
                    alt="A peaceful lake surrounded by green forests in Da Lat">

                <figcaption>
                    Da Lat Lake
                </figcaption>
            </figure>

            <figure>
                <img
                    src="images/vietnam6.jpg"
                    alt="Ho Chi Minh City skyline illuminated at night">

                <figcaption>
                    Ho Chi Minh City
                </figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Interactive Vietnam Gallery</p>
    </footer>

</body>

</html>
